---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-stack
  namespace: argocd
spec:
  project: default 
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql 
      targetRevision: postgresql/17.1.0
      helm:
        valueFiles: 
          - $values/postgresql/values.yaml
    - repoURL: https://github.com/PolarisKnight/homeops
      targetRevision: HEAD 
      ref: values 
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true 
