---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  sources: # use 'source' if only referencing a single source
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack # as seen in the 'charts' directory in the repo
    targetRevision: 82.15.1
    helm:
      valueFiles:
        - $values/prometheus/prometheus-values.yaml # as seen in 'charts'
  - repoURL: https://github.com/PolarisKnight/homeops
    targetRevision: HEAD 
    ref: values # this means that the URL will represent $values
  destination:
      server: https://kubernetes.default.svc
      namespace: monitoring
  syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true # this fixes the annotation size issue for RKE2
