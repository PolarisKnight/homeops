---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack # as seen in the 'charts' directory in the repo
    targetRevision: 82.15.1
    helm:
      valueFiles:
        - prometheus-values.yaml # as seen in 'charts'
  destination:
      server: https://kubernetes.default.svc
      namespace: monitoring
  syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
